name: Quality Gate & Testing (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Automatically caches dependencies to speed up subsequent builds

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Linter and Formatter Check (Ruff)
      run: python -m ruff check .

    - name: Run Static Type Analysis (MyPy)
      run: python -m mypy src/

    - name: Run Automation Test Suite (Pytest)
      run: python -m pytest -v